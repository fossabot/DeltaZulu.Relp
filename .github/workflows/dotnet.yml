name: .NET

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Relp.slnx

      - name: Build
        run: dotnet build Relp.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Relp.slnx --configuration Release --no-build --logger trx
